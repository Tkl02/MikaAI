<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            background: transparent;
        }
    </style>
</head>

<body>
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMExpressionPresetName } from '@pixiv/three-vrm';

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 1.5); // Focado no busto/rosto

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);

        let currentVrm = null;
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        // Substitua 'mika.vrm' pelo nome do seu arquivo
        loader.load('./BaseModel.vrm', (gltf) => {
            const vrm = gltf.userData.vrm;
            scene.add(vrm.scene);
            currentVrm = vrm;
            vrm.scene.rotation.y = 0; // Vira para a câmera
            console.log("VRM Carregado!");
        });

        // Função global que o Python vai chamar
        window.changeMikaExpression = (state) => {
            if (!currentVrm) return;
            const s = currentVrm.expressionManager;

            // Reseta expressões
            s.setValue(VRMExpressionPresetName.Joy, 0);
            s.setValue(VRMExpressionPresetName.Angry, 0);
            s.setValue(VRMExpressionPresetName.Sorrow, 0);

            // Aplica a nova
            if (state === 'happy') s.setValue(VRMExpressionPresetName.Joy, 1);
            if (state === 'angry') s.setValue(VRMExpressionPresetName.Angry, 1);
            if (state === 'sad') s.setValue(VRMExpressionPresetName.Sorrow, 1);
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
                // Animação básica de "respirar"
                currentVrm.scene.position.y = Math.sin(Date.now() * 0.002) * 0.005;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
